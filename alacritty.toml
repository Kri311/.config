# Example Alacritty config file
[window]
title = "Alacritty"
dynamic_title = false
dimensions = { columns = 120, lines = 35 }
padding = { x = 10, y = 10 }
decorations = "full"
opacity = 1.00
startup_mode = "Windowed"
dynamic_padding = true

[terminal.shell]
program = "C:\\Program Files\\PowerShell\\7\\pwsh.exe"
args = ["-NoLogo"]

[cursor]
style = { shape = "Block", blinking = "Always" }
blink_interval = 1000
blink_timeout = 100

[selection]
save_to_clipboard = true

[colors.cursor]
text = "#000000"
cursor = "#ffffff"

[colors.normal]
black = "#1b1b1b"
red = "#ff5f5f"
green = "#5fff87"
yellow = "#ffd75f"
blue = "#5fafff"
magenta = "#af87ff"
cyan = "#5fd7ff"
white = "#d0d0d0"

[colors.bright]
black = "#6f6f6f"
red = "#ff8787"
green = "#87ffaf"
yellow = "#ffff87"
blue = "#87d7ff"
magenta = "#d7afff"
cyan = "#87ffff"
white = "#ffffff"

[scrolling]
history=10000
multiplier=5

[font]
normal = { family = "JetBrains Mono", style = "Bold" }
size = 14

[colors.primary]
background = "#0f0f0f"
foreground = "#d0d0d0"

[keyboard]
# Keybindings section

[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "CreateNewWindow"

[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "W"
mods = "Alt"
action = "Quit"

[terminal]
